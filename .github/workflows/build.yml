name: Legacy Build Notice

"on":
    workflow_dispatch:

permissions:
    contents: read

jobs:
    notice:
        name: Use split workflows
        runs-on: ubuntu-latest
        steps:
            - name: Print migration notice
              run: |
                  echo "Build & Release has been split into CI, Desktop Build, Android Build, PR label build, and Release workflows."
                  echo "Use .github/workflows/ci.yml for checks and .github/workflows/release.yml for publishing."
