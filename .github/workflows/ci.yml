name: CI

"on":
    push:
        branches: ["main", "dev"]
        paths:
            - "core/**"
            - "desktop/**"
            - "android-bridge/**"
            - "android/**"
            - "Cargo.toml"
            - "Cargo.lock"
            - ".github/workflows/ci.yml"
            - ".github/workflows/desktop-build.yml"
            - ".github/workflows/android-build.yml"
            - ".github/workflows/pr-review.yml"
            - ".github/workflows/release.yml"
    pull_request:
        branches: ["main", "dev"]
        paths:
            - "core/**"
            - "desktop/**"
            - "android-bridge/**"
            - "android/**"
            - "Cargo.toml"
            - "Cargo.lock"
            - ".github/workflows/ci.yml"
            - ".github/workflows/desktop-build.yml"
            - ".github/workflows/android-build.yml"
            - ".github/workflows/pr-review.yml"
            - ".github/workflows/release.yml"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    rust-checks:
        name: fmt / clippy / test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Linux dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
                    libxkbcommon-dev libgtk-3-dev libglib2.0-dev libatk1.0-dev \
                    libgl1-mesa-dev libegl1-mesa-dev libasound2-dev

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt, clippy

            - name: Cache cargo artifacts
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-cargo-ci-${{ hashFiles('Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-ci-
                      ${{ runner.os }}-cargo-

            - name: Check formatting
              run: cargo fmt --all -- --check

            - name: Run Clippy
              run: cargo clippy --all-targets --all-features -- -D warnings

            - name: Run tests
              run: cargo test --all --all-features

    android-gradle-check:
        name: Android Gradle check
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: temurin

            - name: Setup Android SDK
              uses: android-actions/setup-android@v3

            - name: Cache Gradle
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: ${{ runner.os }}-gradle-ci-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
                  restore-keys: |
                      ${{ runner.os }}-gradle-ci-
                      ${{ runner.os }}-gradle-

            - name: Validate Android project
              working-directory: android
              run: |
                  chmod +x gradlew
                  ./gradlew :app:lintVitalRelease --stacktrace

    build-desktop:
        name: Build desktop packages
        uses: ./.github/workflows/desktop-build.yml
        with:
            version: ci-${{ github.sha }}
            artifact-prefix: ci-desktop

    build-android:
        name: Build Android APKs
        uses: ./.github/workflows/android-build.yml
        with:
            version: ci-${{ github.sha }}
            artifact-prefix: ci-android
        secrets: inherit
